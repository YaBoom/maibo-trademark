<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脉搏跳动商标超市 - 静态原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F0F5FF; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .logo { margin-bottom: 40px; }
    .logo-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #2E6BFF, #00C9A7);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(46,107,255,0.3);
    }
    .logo-circle span { color: #fff; font-size: 22px; font-weight: 700; }
    .logo h1 { text-align: center; font-size: 24px; color: #111827; font-weight: 700; }
    .logo p { text-align: center; font-size: 14px; color: #6B7280; margin-top: 8px; }
    .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 700px; }
    .card {
      background: #fff; border-radius: 16px; padding: 36px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center;
      width: 280px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none; color: inherit;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(46,107,255,0.12); }
    .card-icon { width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .card:nth-child(1) .card-icon { background: linear-gradient(135deg, #EFF4FF, #D9E5FF); }
    .card:nth-child(2) .card-icon { background: linear-gradient(135deg, #EEFBF6, #D0F5E8); }
    .card h2 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .card p { font-size: 14px; color: #6B7280; line-height: 1.6; }
    .card .arrow { margin-top: 20px; color: #2E6BFF; font-size: 14px; font-weight: 600; }
    .footer { margin-top: 60px; font-size: 12px; color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-circle"><span>MB</span></div>
    <h1>脉搏跳动商标超市</h1>
    <p>静态设计稿原型（归档）</p>
  </div>
  <div class="cards">
    <a class="card" href="/prototype/pc/index.html">
      <div class="card-icon">🖥️</div>
      <h2>PC 网站</h2>
      <p>桌面端品牌改版原型</p>
      <div class="arrow">进入查看 →</div>
    </a>
    <a class="card" href="/prototype/miniapp/home.html">
      <div class="card-icon">📱</div>
      <h2>小程序原型</h2>
      <p>微信小程序 UI 重构</p>
      <div class="arrow">进入查看 →</div>
    </a>
  </div>
  <div class="footer">© 2026 脉搏跳动商标超市 · 静态原型归档</div>
</body>
</html>
